project:
  type: website
  output-dir: _site

website:
  title: "Georg Wiese"
  site-url: https://georgwiese.github.io/
  description: "Personal technical blog"
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: rss
        href: index.xml
        aria-label: RSS feed
  page-footer:
    center: "© Georg Wiese"
  comments:
    giscus:
      repo: REPLACE-WITH-GITHUB-REPO
      repo-id: REPLACE-WITH-REPO-ID
      category: REPLACE-WITH-CATEGORY
      category-id: REPLACE-WITH-CATEGORY-ID
      mapping: pathname
      reactions-enabled: true
      loading: lazy

format:
  html:
    theme:
      light: flatly
      dark: darkly
    highlight-style: github
    toc: true
    toc-depth: 3
    toc-title: "Contents"
    code-copy: true
    code-overflow: wrap
    math: mathjax
    link-external-newwindow: true
